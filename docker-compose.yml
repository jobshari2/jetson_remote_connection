services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WORKSPACE_DIR=/workspace
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GPU_ENABLED=${GPU_ENABLED:-true}
      - HOST=0.0.0.0
      - PORT=8000
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-500}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: ${GPU_ENABLED:+nvidia}
    networks:
      - workbench-net

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    networks:
      - workbench-net

networks:
  workbench-net:
    driver: bridge
